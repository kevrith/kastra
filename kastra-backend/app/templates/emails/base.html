<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>{% block subject %}Kastra{% endblock %}</title>
</head>
<body style="margin:0;padding:0;background:#f1f5f9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
<table width="100%" cellpadding="0" cellspacing="0" role="presentation">
  <tr><td align="center" style="padding:40px 16px">
    <table width="560" cellpadding="0" cellspacing="0" role="presentation" style="max-width:560px;width:100%">

      <!-- Header bar -->
      <tr>
        <td style="background:#0f172a;padding:22px 28px;border-radius:10px 10px 0 0">
          <p style="margin:0 0 4px;color:#4ade80;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase">
            {% block brand %}Kastra{% endblock %}
          </p>
          <h1 style="margin:0;color:#f8fafc;font-size:20px;font-weight:700;line-height:1.3">
            {% block heading %}{% endblock %}
          </h1>
        </td>
      </tr>

      <!-- Body -->
      <tr>
        <td style="background:#ffffff;border:1px solid #e2e8f0;border-top:none;padding:28px 28px 24px;border-radius:0 0 10px 10px">
          {% block content %}{% endblock %}
        </td>
      </tr>

      <!-- Footer -->
      <tr>
        <td style="padding:20px 0 0;text-align:center">
          <p style="margin:0;font-size:11px;color:#94a3b8;line-height:1.6">
            Kastra Enterprise Management &mdash; Built for Kenyan SMEs
          </p>
        </td>
      </tr>

    </table>
  </td></tr>
</table>
</body>
</html>

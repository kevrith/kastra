<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kastra — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f9fafb;
      color: #374151;
      padding: 1rem;
    }
    .card {
      background: white;
      border-radius: 1rem;
      border: 1px solid #e5e7eb;
      padding: 2.5rem 2rem;
      text-align: center;
      max-width: 360px;
      width: 100%;
    }
    .logo { font-size: 2rem; font-weight: 700; color: #16a34a; margin-bottom: 1rem; }
    h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; }
    p { font-size: 0.875rem; color: #6b7280; line-height: 1.5; }
    button {
      margin-top: 1.5rem;
      padding: 0.625rem 1.5rem;
      background: #16a34a;
      color: white;
      border: none;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
    }
    button:hover { background: #15803d; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Kastra</div>
    <h1>You are offline</h1>
    <p>Check your internet connection and try again. Your data is safe and will sync when you reconnect.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>

services:
  - type: web
    name: kastra-api
    runtime: python
    rootDir: kastra-backend
    buildCommand: pip install -r requirements.txt && playwright install chromium && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"

      # Paste your Neon (neon.tech) connection string here after creating a free database
      - key: DATABASE_URL
        sync: false   # postgresql+asyncpg://user:pass@ep-xxx.neon.tech/kastra?sslmode=require

      # Auto-generated secrets — Render fills these on first deploy
      - key: SECRET_KEY
        generateValue: true
      - key: REFRESH_SECRET_KEY
        generateValue: true

      - key: ENVIRONMENT
        value: production

      # Set these after your Vercel deploy (Dashboard → Environment)
      - key: FRONTEND_URL
        sync: false   # e.g. https://kastra.vercel.app or your custom domain
      - key: BACKEND_URL
        sync: false   # e.g. https://kastra-api.onrender.com

      # Email (SendGrid)
      - key: SENDGRID_API_KEY
        sync: false
      - key: MAIL_FROM
        sync: false   # e.g. noreply@kastra.co.ke

      # Claude AI / OCR
      - key: ANTHROPIC_API_KEY
        sync: false

      # M-Pesa (Safaricom Daraja)
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_SHORTCODE
        sync: false
      - key: MPESA_PASSKEY
        sync: false
      - key: MPESA_CALLBACK_URL
        sync: false   # e.g. https://kastra-api.onrender.com/api/mpesa/callback
      - key: MPESA_ENV
        value: production

      # Paystack (card payments)
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false

      # Google OAuth (optional)
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false

      # Error tracking (optional)
      - key: SENTRY_DSN
        sync: false

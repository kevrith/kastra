name: Backend Tests

on:
  push:
    branches: [main, develop]
    paths:
      - "kastra-backend/**"
      - ".github/workflows/test.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "kastra-backend/**"

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kastra_user
          POSTGRES_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
          POSTGRES_DB: kastra_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: kastra-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: kastra-backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://kastra_user:${{ secrets.TEST_DB_PASSWORD }}@localhost:5432/kastra_test
        run: alembic upgrade head

      - name: Run tests
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://kastra_user:${{ secrets.TEST_DB_PASSWORD }}@localhost:5432/kastra_test
          SECRET_KEY: ci-test-secret-key-32-chars-long!!
          REFRESH_SECRET_KEY: ci-test-refresh-key-32-chars-long!
          ENVIRONMENT: testing
          FRONTEND_URL: http://localhost:5200
          BACKEND_URL: http://localhost:8080
        run: pytest -v --tb=short

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-lint:
    name: backend lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kastra-backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check app/ tests/ alembic/

  backend-test:
    name: backend tests (pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kastra_user
          POSTGRES_PASSWORD: kastra_ci_password
          POSTGRES_DB: kastra_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: kastra-backend

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: kastra-backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://kastra_user:kastra_ci_password@localhost:5432/kastra_test
        run: alembic upgrade head

      - name: Run tests
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://kastra_user:kastra_ci_password@localhost:5432/kastra_test
          SECRET_KEY: ci-test-secret-key-32-chars-long!!
          REFRESH_SECRET_KEY: ci-test-refresh-key-32-chars-long!
          ENVIRONMENT: testing
          FRONTEND_URL: http://localhost:5200
          BACKEND_URL: http://localhost:8080
        run: pytest -v --tb=short

  backend-audit:
    name: dependency audit (pip-audit)
    runs-on: ubuntu-latest
    # Visibility, not a merge gate: new CVEs in pinned deps shouldn't block
    # unrelated PRs — Dependabot opens the fix PRs.
    continue-on-error: true
    defaults:
      run:
        working-directory: kastra-backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pip-audit
      - run: pip-audit -r requirements.txt

  frontend:
    name: frontend lint + tests + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kastra-frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: kastra-frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

version: 2
updates:
  - package-ecosystem: pip
    directory: /kastra-backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      python-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /kastra-frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types: [minor, patch]
    ignore:
      # Tailwind v4 is a breaking migration (PostCSS plugin split, CSS-first
      # config); upgrade deliberately, not via Dependabot
      - dependency-name: tailwindcss
        update-types: [version-update:semver-major]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
